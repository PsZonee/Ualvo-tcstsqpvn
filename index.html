<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ualvo tcstsqpvn – Long Dairy Milk Bar</title>
    <style>
        :root {
            --bg-pink: #ffe0ec;
            --pink-dark: #e891b4;
            --pink-accent: #ff6b9d;
            --chocolate-base: #8b5e34;
            --chocolate-light: #a87d52;
            --chocolate-highlight: #c49a6c;
            --chocolate-dark: #5c3818;
            --wrapper-purple: #3a1040;
            --wrapper-purple-light: #4d1a54;
            --wrapper-gold: #d4a853;
            --wrapper-gold-light: #e8c878;
            --cream: #fff5f0;
            --white: #fff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ffd6e8 0%, #ffe4ef 20%, #ffd0e2 40%, #ffdde8 60%, #ffd4e6 80%, #ffe8f2 100%);
            background-size: 300% 300%;
            animation: bgShift 14s ease-in-out infinite;
            font-family: 'Segoe UI', 'SF Pro Display', 'Helvetica Neue', sans-serif;
            overflow-x: hidden;
            cursor: default;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            position: relative;
            padding: 10px;
            touch-action: manipulation;
        }

        @keyframes bgShift {
            0%,
            100% {
                background-position: 0% 50%;
            }
            25% {
                background-position: 100% 30%;
            }
            50% {
                background-position: 80% 100%;
            }
            75% {
                background-position: 20% 80%;
            }
        }

        /* Floating hearts */
        .hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .floating-heart {
            position: absolute;
            bottom: -60px;
            font-size: 20px;
            animation: floatUp linear infinite;
            opacity: 0.45;
            filter: blur(0.5px);
        }
        @keyframes floatUp {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg) scale(0.5);
                opacity: 0;
            }
            8% {
                opacity: 0.6;
            }
            25% {
                transform: translateY(-28vh) translateX(22px) rotate(12deg) scale(0.85);
                opacity: 0.45;
            }
            55% {
                transform: translateY(-58vh) translateX(-16px) rotate(-8deg) scale(0.7);
                opacity: 0.25;
            }
            85% {
                opacity: 0.05;
            }
            100% {
                transform: translateY(-105vh) translateX(8px) rotate(4deg) scale(0.3);
                opacity: 0;
            }
        }

        /* Main container */
        .main-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            padding: 0 15px;
        }

        /* Instruction */
        .instruction {
            font-size: 1.15rem;
            font-weight: 700;
            color: #5c2550;
            text-align: center;
            background: rgba(255, 255, 255, 0.72);
            padding: 10px 22px;
            border-radius: 50px;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 16px rgba(160, 90, 130, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: instructionPulse 2.8s ease-in-out infinite;
            max-width: 90vw;
            line-height: 1.35;
        }
        @keyframes instructionPulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.03);
            }
        }
        .instruction.peeling-done {
            animation: instructionBounce 0.6s ease;
            color: #4a2a10;
            background: rgba(255, 242, 230, 0.9);
        }
        @keyframes instructionBounce {
            0%,
            100% {
                transform: scale(1);
            }
            20% {
                transform: scale(1.08);
            }
            40% {
                transform: scale(0.94);
            }
            60% {
                transform: scale(1.04);
            }
            80% {
                transform: scale(0.97);
            }
        }

        /* Chocolate area – LONG and NARROW like a real Dairy Milk bar */
        .chocolate-area {
            position: relative;
            width: 100%;
            max-width: 175px;
            /* Very long bar height */
            height: 460px;
            perspective: 900px;
            cursor: pointer;
            border-radius: 14px;
            margin: 0 auto;
            touch-action: manipulation;
        }

        /* Responsive adjustments */
        @media (max-width: 380px) {
            .chocolate-area {
                max-width: 150px;
                height: 390px;
            }
            .instruction {
                font-size: 1rem;
                padding: 9px 18px;
            }
        }
        @media (max-width: 340px) {
            .chocolate-area {
                max-width: 135px;
                height: 340px;
            }
            .instruction {
                font-size: 0.9rem;
                padding: 8px 15px;
            }
        }
        @media (min-width: 500px) {
            .chocolate-area {
                max-width: 190px;
                height: 520px;
            }
        }
        @media (min-width: 700px) {
            .chocolate-area {
                max-width: 200px;
                height: 560px;
            }
        }

        /* Chocolate bar */
        .chocolate-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #5c3818;
            border-radius: 12px;
            display: grid;
            /* Narrow: 3 columns, Long: 6 rows = 18 pieces */
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 4px;
            padding: 7px;
            box-shadow:
                0 10px 35px rgba(0, 0, 0, 0.3),
                0 2px 6px rgba(0, 0, 0, 0.2),
                inset 0 0 0 2.5px rgba(0, 0, 0, 0.15);
            z-index: 1;
            transform: rotateX(2deg);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }
        .chocolate-bar.revealed {
            box-shadow:
                0 10px 35px rgba(0, 0, 0, 0.3),
                0 2px 6px rgba(0, 0, 0, 0.2),
                0 0 28px rgba(180, 130, 80, 0.35),
                inset 0 0 0 2.5px rgba(0, 0, 0, 0.15);
        }

        /* Chocolate segment */
        .chocolate-segment {
            background: linear-gradient(175deg,
                    #c49a6c 0%, #b8895a 12%, #a87d52 25%, #9a7045 40%, #8b5e34 55%, #7a4f2a 70%, #6b4220 100%);
            border-radius: 5px;
            position: relative;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow:
                0 2px 5px rgba(0, 0, 0, 0.35),
                inset 0 1px 2px rgba(255, 210, 160, 0.3),
                inset 0 -2px 3px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            transform: translateY(0);
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .chocolate-segment::before {
            content: '';
            position: absolute;
            top: 3px;
            left: 10%;
            width: 80%;
            height: 25%;
            background: rgba(255, 220, 175, 0.22);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
        }
        .chocolate-segment::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 15%;
            width: 70%;
            height: 10%;
            background: rgba(0, 0, 0, 0.16);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
        }
        .chocolate-segment .gloss-dot {
            position: absolute;
            top: 10%;
            left: 18%;
            width: 12%;
            height: 12%;
            background: rgba(255, 255, 255, 0.38);
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;
            filter: blur(1px);
        }
        .chocolate-segment:active {
            transform: scale(0.88);
            transition: transform 0.05s ease;
        }
        .chocolate-segment.eaten {
            animation: biteAnimation 0.48s cubic-bezier(0.36, 0, 0.66, -0.56) forwards;
            pointer-events: none;
        }
        @keyframes biteAnimation {
            0% {
                transform: scale(1);
                opacity: 1;
                filter: brightness(1);
            }
            10% {
                transform: scale(1.35) rotate(-7deg);
                opacity: 0.9;
                filter: brightness(1.3);
            }
            35% {
                transform: scale(0.6) rotate(11deg);
                opacity: 0.5;
                filter: brightness(0.7);
            }
            65% {
                transform: scale(0.18) rotate(-28deg);
                opacity: 0.18;
            }
            100% {
                transform: scale(0) rotate(48deg);
                opacity: 0;
            }
        }

        /* Wrapper overlay – long and narrow */
        .wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(185deg,
                    #4d1a54 0%, #3a1040 8%, #2f0d34 28%, #3a1040 52%, #4d1a54 82%, #3a1040 100%);
            border-radius: 12px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            cursor: pointer;
            clip-path: inset(0% 0 0 0);
            transition: clip-path 0.45s cubic-bezier(0.25, 0.1, 0.25, 1);
            box-shadow:
                0 10px 35px rgba(0, 0, 0, 0.35),
                0 2px 5px rgba(0, 0, 0, 0.2),
                inset 0 0 0 2px rgba(255, 255, 255, 0.04);
            overflow: hidden;
            touch-action: manipulation;
        }
        .wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(ellipse at 30% 10%, rgba(255, 255, 255, 0.06) 0%, transparent 40%),
                radial-gradient(ellipse at 60% 50%, rgba(255, 255, 255, 0.03) 0%, transparent 30%),
                radial-gradient(ellipse at 45% 78%, rgba(212, 168, 83, 0.05) 0%, transparent 28%);
            pointer-events: none;
            border-radius: 12px;
        }
        .wrapper::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 3%;
            right: 3%;
            bottom: 2px;
            border: 1.5px solid rgba(212, 168, 83, 0.25);
            border-radius: 10px;
            pointer-events: none;
            z-index: 0;
        }

        /* Tear strip */
        .tear-strip {
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 62%;
            height: 4px;
            background: linear-gradient(90deg,
                    transparent, #c49a3c 12%, #e8c878 25%, #d4a853 40%, #e8c878 55%, #d4a853 70%, #c49a3c 85%, transparent);
            border-radius: 2px;
            z-index: 4;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }
        .tear-tab {
            position: absolute;
            top: -3px;
            left: 50%;
            transform: translateX(-50%);
            width: 48px;
            height: 18px;
            background: linear-gradient(180deg, #f0d890 0%, #d4a853 40%, #b8903c 100%);
            border-radius: 0 0 12px 12px;
            z-index: 5;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.28);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 7px;
            font-weight: 800;
            color: #4a2a10;
            letter-spacing: 1px;
            animation: tabWiggle 2.5s ease-in-out infinite;
            cursor: pointer;
        }
        @keyframes tabWiggle {
            0%,
            100% {
                transform: translateX(-50%) rotate(0deg);
            }
            20% {
                transform: translateX(-50%) rotate(3deg);
            }
            50% {
                transform: translateX(-50%) rotate(-2.5deg);
            }
            75% {
                transform: translateX(-50%) rotate(1.5deg);
            }
        }
        .tear-tab.pulled {
            animation: tabPull 0.4s ease-out forwards;
        }
        @keyframes tabPull {
            0% {
                transform: translateX(-50%) rotate(0deg) scale(1);
            }
            100% {
                transform: translateX(-50%) rotate(-18deg) scale(1.15) translateY(8px);
                opacity: 0.4;
            }
        }

        /* Wrapper branding */
        .wrapper-branding {
            text-align: center;
            z-index: 1;
            pointer-events: none;
            padding: 10px 14px;
            position: relative;
        }
        .wrapper-branding .brand-name {
            display: block;
            font-size: 1.5rem;
            font-weight: 900;
            color: #f0d890;
            letter-spacing: 1px;
            text-shadow:
                0 2px 6px rgba(0, 0, 0, 0.5),
                0 0 20px rgba(240, 216, 144, 0.2),
                0 1px 0 rgba(255, 255, 255, 0.08);
            font-family: 'Georgia', 'Times New Roman', 'Palatino', serif;
            line-height: 1.1;
        }
        @media (max-width: 380px) {
            .wrapper-branding .brand-name {
                font-size: 1.2rem;
            }
            .tear-tab {
                width: 40px;
                height: 15px;
                font-size: 6px;
            }
        }
        .wrapper-branding .brand-subtitle {
            display: block;
            font-size: 0.65rem;
            color: #e8c878;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            font-weight: 600;
            margin-top: 3px;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
        }

        /* Wrapper sparkles */
        .wrapper-sparkle {
            position: absolute;
            pointer-events: none;
            font-size: 13px;
            z-index: 6;
            animation: sparkleFloat 3.5s ease-in-out infinite;
        }
        @keyframes sparkleFloat {
            0%,
            100% {
                opacity: 0.2;
                transform: translateY(0) scale(0.65);
            }
            50% {
                opacity: 1;
                transform: translateY(-12px) scale(1.3);
            }
        }

        /* Peel curl */
        .peel-curl {
            position: absolute;
            left: 2%;
            right: 2%;
            height: 18px;
            pointer-events: none;
            z-index: 12;
            display: none;
            border-radius: 0 0 6px 6px;
            background: linear-gradient(180deg,
                    #3a1040 0%, #4d1a54 25%, #8a7a70 55%, #b8afa8 75%, transparent 100%);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.3);
            transform: perspective(180px) rotateX(7deg);
            transform-origin: top center;
            transition: top 0.45s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        .peel-curl.active {
            display: block;
        }

        /* Particles */
        .particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            animation: particleFly 0.65s ease-out forwards;
        }
        @keyframes particleFly {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--dx), var(--dy)) scale(0);
                opacity: 0;
            }
        }
        .sparkle-particle {
            position: absolute;
            pointer-events: none;
            font-size: 16px;
            animation: sparkleBurst 0.6s ease-out forwards;
        }
        @keyframes sparkleBurst {
            0% {
                transform: translate(0, 0) scale(0) rotate(0deg);
                opacity: 1;
            }
            55% {
                transform: translate(var(--sdx), var(--sdy)) scale(1.35) rotate(150deg);
                opacity: 0.75;
            }
            100% {
                transform: translate(var(--sdx2), var(--sdy2)) scale(0) rotate(330deg);
                opacity: 0;
            }
        }
        .confetti-piece {
            position: absolute;
            pointer-events: none;
            width: 8px;
            height: 8px;
            border-radius: 2px;
            animation: confettiFall 1.5s ease-out forwards;
        }
        @keyframes confettiFall {
            0% {
                transform: translate(0, -40px) rotate(0deg) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--cx), 350px) rotate(var(--cr)) scale(0.2);
                opacity: 0;
            }
        }

        /* Bite counter */
        .bite-counter {
            font-size: 0.95rem;
            font-weight: 600;
            color: #5c2550;
            background: rgba(255, 255, 255, 0.68);
            padding: 9px 20px;
            border-radius: 50px;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 14px rgba(160, 90, 130, 0.16);
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            gap: 7px;
            max-width: 90vw;
        }
        .bite-counter .emoji {
            font-size: 1.15rem;
            animation: emojiBounce 1s ease-in-out infinite;
        }
        @keyframes emojiBounce {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-4px);
            }
        }
        .bite-counter.finished {
            background: rgba(255, 228, 238, 0.9);
            color: #c94d7c;
            animation: finishedGlow 1.6s ease-in-out infinite;
        }
        @keyframes finishedGlow {
            0%,
            100% {
                box-shadow: 0 4px 14px rgba(195, 75, 115, 0.18);
            }
            50% {
                box-shadow: 0 4px 28px rgba(195, 75, 115, 0.48);
            }
        }

        /* Reset button */
        .reset-btn {
            display: none;
            font-size: 0.95rem;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #e891b4, #d4688e);
            border: none;
            padding: 13px 28px;
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 0.4px;
            box-shadow: 0 6px 20px rgba(195, 95, 135, 0.35);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: btnAppear 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 4px;
            touch-action: manipulation;
        }
        .reset-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 26px rgba(195, 95, 135, 0.48);
        }
        .reset-btn:active {
            transform: scale(0.9);
        }
        @keyframes btnAppear {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Shake */
        .shake {
            animation: screenShake 0.32s ease-out;
        }
        @keyframes screenShake {
            0%,
            100% {
                transform: translateX(0);
            }
            10% {
                transform: translateX(-4px) rotate(-0.6deg);
            }
            20% {
                transform: translateX(3px) rotate(0.6deg);
            }
            30% {
                transform: translateX(-2px);
            }
            40% {
                transform: translateX(1.5px);
            }
            60% {
                transform: translateX(-1px);
            }
            80% {
                transform: translateX(0.5px);
            }
        }
        .wrapper-fall {
            animation: wrapperFallOff 0.7s cubic-bezier(0.4, 0, 0.6, 1) forwards;
            pointer-events: none !important;
        }
        @keyframes wrapperFallOff {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
                clip-path: inset(100% 0 0 0);
            }
            40% {
                transform: translateY(25px) rotate(-4deg);
                opacity: 0.65;
            }
            100% {
                transform: translateY(160px) rotate(-12deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <!-- Floating hearts -->
    <div class="hearts-container" id="heartsContainer"></div>

    <!-- Particles -->
    <div class="particles-container" id="particlesContainer"></div>

    <!-- Main -->
    <div class="main-container" id="mainContainer">
        <div class="instruction" id="instruction">👆 Tap the tab to peel the wrapper!</div>

        <div class="chocolate-area" id="chocolateArea">
            <div class="chocolate-bar" id="chocolateBar"></div>
            <div class="wrapper" id="wrapper">
                <div class="tear-tab" id="tearTab">↕ PULL</div>
                <div class="tear-strip"></div>
                <div class="wrapper-branding">
                    <span class="brand-name">Ualvo<br>tcstsqpvn</span>
                    <span class="brand-subtitle">✦ Milk Chocolate ✦</span>
                </div>
                <span class="wrapper-sparkle" style="top:8%;left:8%;animation-delay:0s;">✨</span>
                <span class="wrapper-sparkle" style="top:16%;right:10%;animation-delay:1.3s;">⭐</span>
                <span class="wrapper-sparkle" style="bottom:18%;left:12%;animation-delay:2.3s;">💫</span>
                <span class="wrapper-sparkle" style="bottom:12%;right:10%;animation-delay:0.6s;">✨</span>
                <span class="wrapper-sparkle" style="top:48%;left:18%;animation-delay:1.8s;">💖</span>
            </div>
            <div class="peel-curl" id="peelCurl"></div>
        </div>

        <div class="bite-counter" id="biteCounter">
            <span class="emoji">🍫</span> Chocolate ready: <strong>18 pieces</strong>
        </div>

        <button class="reset-btn" id="resetBtn">🔄 Get Another Bar!</button>
    </div>

    <script>
        (function() {
            // ────────────────────────────
            // DOM refs
            // ────────────────────────────
            const chocolateBar = document.getElementById('chocolateBar');
            const wrapper = document.getElementById('wrapper');
            const peelCurl = document.getElementById('peelCurl');
            const tearTab = document.getElementById('tearTab');
            const instruction = document.getElementById('instruction');
            const biteCounter = document.getElementById('biteCounter');
            const resetBtn = document.getElementById('resetBtn');
            const chocolateArea = document.getElementById('chocolateArea');
            const particlesContainer = document.getElementById('particlesContainer');
            const heartsContainer = document.getElementById('heartsContainer');

            // ────────────────────────────
            // State – 3 columns × 6 rows = 18 segments
            // ────────────────────────────
            const TOTAL_PEEL_TAPS = 10;
            const TOTAL_SEGMENTS = 18;
            let peelTapCount = 0;
            let eatenSegments = new Array(TOTAL_SEGMENTS).fill(false);
            let isPeelingPhase = true;
            let isAnimating = false;
            let totalEaten = 0;
            let firstTapDone = false;
            let peelCompleted = false;

            // ────────────────────────────
            // Build chocolate segments
            // ────────────────────────────
            function buildSegments() {
                chocolateBar.innerHTML = '';
                for (let i = 0; i < TOTAL_SEGMENTS; i++) {
                    const seg = document.createElement('div');
                    seg.className = 'chocolate-segment';
                    seg.dataset.index = i;
                    const dot = document.createElement('span');
                    dot.className = 'gloss-dot';
                    seg.appendChild(dot);
                    // Only use click event – mobile-safe with touch-action CSS
                    seg.addEventListener('click', function(e) {
                        e.stopPropagation();
                        onSegmentClick(seg, i);
                    });
                    chocolateBar.appendChild(seg);
                }
            }

            function disableSegmentClicks() {
                document.querySelectorAll('.chocolate-segment').forEach(s => {
                    s.style.pointerEvents = 'none';
                });
            }

            function enableSegmentClicks() {
                document.querySelectorAll('.chocolate-segment').forEach(s => {
                    if (!eatenSegments[parseInt(s.dataset.index)]) {
                        s.style.pointerEvents = 'auto';
                    }
                });
            }

            // ────────────────────────────
            // Wrapper / peel handling
            // ────────────────────────────
            wrapper.addEventListener('click', function(e) {
                e.stopPropagation();
                onWrapperClick();
            });

            function onWrapperClick() {
                if (!isPeelingPhase || isAnimating) return;
                if (peelTapCount >= TOTAL_PEEL_TAPS) return;

                isAnimating = true;
                peelTapCount++;

                // First tap – animate tear tab
                if (!firstTapDone) {
                    firstTapDone = true;
                    tearTab.classList.add('pulled');
                    spawnSparklesAtEdge(0, 6);
                }

                const peelPercent = Math.min((peelTapCount / TOTAL_PEEL_TAPS) * 100, 100);
                wrapper.style.clipPath = 'inset(' + peelPercent + '% 0 0 0)';

                const areaHeight = chocolateArea.offsetHeight;
                const curlTop = (peelPercent / 100) * areaHeight;
                peelCurl.style.top = Math.max(0, curlTop - 9) + 'px';
                peelCurl.classList.add('active');

                spawnSparklesAtEdge(peelPercent, 5);

                if (peelTapCount < TOTAL_PEEL_TAPS) {
                    const rem = TOTAL_PEEL_TAPS - peelTapCount;
                    instruction.textContent = '👆 Keep peeling! (' + rem + ' more tap' + (rem > 1 ? 's' : '') +
                    ')';
                    chocolateArea.classList.add('shake');
                    setTimeout(function() { chocolateArea.classList.remove('shake'); }, 320);
                }

                if (peelTapCount >= TOTAL_PEEL_TAPS && !peelCompleted) {
                    peelCompleted = true;
                    finishPeeling();
                }

                setTimeout(function() { isAnimating = false; }, 400);
            }

            function spawnSparklesAtEdge(peelPercent, count) {
                const rect = chocolateArea.getBoundingClientRect();
                const edgeY = rect.top + (peelPercent / 100) * rect.height;
                const cx = rect.left + rect.width / 2;
                spawnSparkles(cx, edgeY, count);
            }

            function finishPeeling() {
                wrapper.style.clipPath = 'inset(100% 0 0 0)';
                wrapper.style.pointerEvents = 'none';
                peelCurl.style.top = (chocolateArea.offsetHeight - 9) + 'px';

                setTimeout(function() {
                    wrapper.classList.add('wrapper-fall');
                    peelCurl.classList.remove('active');
                }, 300);

                setTimeout(function() {
                    wrapper.style.display = 'none';
                    peelCurl.style.display = 'none';
                }, 1000);

                isPeelingPhase = false;
                chocolateBar.classList.add('revealed');
                instruction.textContent = '😋 Yay! Tap the chocolate to take a bite!';
                instruction.classList.add('peeling-done');
                biteCounter.innerHTML = '<span class="emoji">🍫</span> Bites left: <strong>18</strong>';
                enableSegmentClicks();

                const rect = chocolateArea.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                spawnSparkles(cx, cy, 22);
                spawnConfetti(cx, cy - 15, 30);

                chocolateBar.style.transform = 'rotateX(2deg) scale(1.03)';
                setTimeout(function() { chocolateBar.style.transform = 'rotateX(2deg) scale(1)'; }, 350);
            }

            // ────────────────────────────
            // Segment bite handling
            // ────────────────────────────
            function onSegmentClick(segment, index) {
                if (isPeelingPhase || isAnimating) return;
                if (eatenSegments[index]) return;

                isAnimating = true;
                eatenSegments[index] = true;
                totalEaten++;

                const segRect = segment.getBoundingClientRect();
                const segCX = segRect.left + segRect.width / 2;
                const segCY = segRect.top + segRect.height / 2;

                segment.classList.add('eaten');
                spawnCrumbs(segCX, segCY, 8);
                spawnSparkles(segCX, segCY, 4);
                chocolateArea.classList.add('shake');
                setTimeout(function() { chocolateArea.classList.remove('shake'); }, 320);

                const left = TOTAL_SEGMENTS - totalEaten;
                if (left > 0) {
                    const emoji = left > 12 ? '😋' : left > 7 ? '🤤' : left > 3 ? '😯' : '🥺';
                    biteCounter.innerHTML =
                        '<span class="emoji">' + emoji + '</span> Bites left: <strong>' + left + '</strong>';
                    instruction.textContent = left > 12 ? '😋 Mmm, so creamy!' :
                        left > 7 ? '🤤 This is delicious!' :
                        left > 3 ? '😯 Getting smaller...' : '🥺 Almost gone...';
                }

                setTimeout(function() {
                    segment.style.visibility = 'hidden';
                    segment.style.pointerEvents = 'none';
                }, 460);

                if (totalEaten >= TOTAL_SEGMENTS) {
                    finishChocolate();
                }

                setTimeout(function() { isAnimating = false; }, 360);
            }

            function finishChocolate() {
                instruction.textContent = '🎉 All gone! That was heavenly!';
                instruction.classList.add('peeling-done');
                biteCounter.innerHTML = '<span class="emoji">😋</span> Chocolate finished!';
                biteCounter.classList.add('finished');
                resetBtn.style.display = 'block';
                chocolateBar.classList.remove('revealed');

                const rect = chocolateArea.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                spawnSparkles(cx, cy, 30);
                spawnConfetti(cx, cy, 45);
                document.querySelectorAll('.chocolate-segment').forEach(function(s) {
                    s.style.pointerEvents = 'none';
                });
            }

            // ────────────────────────────
            // Particles
            // ────────────────────────────
            function spawnCrumbs(x, y, count) {
                for (let i = 0; i < count; i++) {
                    const p = document.createElement('div');
                    p.className = 'particle';
                    const s = 2.5 + Math.random() * 7;
                    p.style.width = s + 'px';
                    p.style.height = s + 'px';
                    p.style.background =
                        'hsl(' + (22 + Math.random() * 18) + ', ' + (45 + Math.random() * 35) + '%, ' + (14 + Math
                            .random() * 22) + '%)';
                    p.style.left = x + 'px';
                    p.style.top = y + 'px';
                    p.style.setProperty('--dx', (Math.random() - 0.5) * 110 + 'px');
                    p.style.setProperty('--dy', (Math.random() - 0.6) * 95 + 'px');
                    p.style.animationDuration = (0.4 + Math.random() * 0.5) + 's';
                    particlesContainer.appendChild(p);
                    setTimeout(function() { p.remove(); }, 800);
                }
            }

            function spawnSparkles(x, y, count) {
                const emojis = ['✨', '⭐', '💫', '🌟', '💖', '✨', '💕', '🔮', '💝', '🩷'];
                for (let i = 0; i < count; i++) {
                    const s = document.createElement('div');
                    s.className = 'sparkle-particle';
                    s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    s.style.left = x + 'px';
                    s.style.top = y + 'px';
                    s.style.fontSize = (12 + Math.random() * 20) + 'px';
                    s.style.setProperty('--sdx', (Math.random() - 0.5) * 150 + 'px');
                    s.style.setProperty('--sdy', (Math.random() - 0.65) * 130 + 'px');
                    s.style.setProperty('--sdx2', (Math.random() - 0.5) * 180 + 'px');
                    s.style.setProperty('--sdy2', (Math.random() - 0.7) * 160 + 'px');
                    s.style.animationDuration = (0.45 + Math.random() * 0.6) + 's';
                    particlesContainer.appendChild(s);
                    setTimeout(function() { s.remove(); }, 880);
                }
            }

            function spawnConfetti(x, y, count) {
                const colors = ['#ff6b9d', '#ff9ec4', '#ffd4e3', '#f0d890', '#e891b4',
                    '#ffb3c6', '#ffc2d1', '#ffe5ec', '#d4a853', '#ff8fab',
                    '#c49a3c', '#e8c878', '#ffe0ec', '#ffd0e2'
                ];
                for (let i = 0; i < count; i++) {
                    const c = document.createElement('div');
                    c.className = 'confetti-piece';
                    c.style.background = colors[Math.floor(Math.random() * colors.length)];
                    c.style.left = x + 'px';
                    c.style.top = y + 'px';
                    c.style.width = (5 + Math.random() * 11) + 'px';
                    c.style.height = (4 + Math.random() * 9) + 'px';
                    c.style.setProperty('--cx', (Math.random() - 0.5) * 320 + 'px');
                    c.style.setProperty('--cr', (Math.random() * 720 - 360) + 'deg');
                    c.style.animationDuration = (1 + Math.random() * 2) + 's';
                    c.style.animationDelay = Math.random() * 0.5 + 's';
                    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                    particlesContainer.appendChild(c);
                    setTimeout(function() { c.remove(); }, 2400);
                }
            }

            // ────────────────────────────
            // Reset
            // ────────────────────────────
            function resetAll() {
                peelTapCount = 0;
                eatenSegments = new Array(TOTAL_SEGMENTS).fill(false);
                isPeelingPhase = true;
                isAnimating = false;
                totalEaten = 0;
                firstTapDone = false;
                peelCompleted = false;

                wrapper.style.clipPath = 'inset(0% 0 0 0)';
                wrapper.style.pointerEvents = 'auto';
                wrapper.style.display = '';
                wrapper.classList.remove('wrapper-fall');
                peelCurl.classList.remove('active');
                peelCurl.style.top = '0px';
                peelCurl.style.display = '';
                tearTab.classList.remove('pulled');
                chocolateBar.classList.remove('revealed');
                chocolateBar.style.transform = 'rotateX(2deg)';

                buildSegments();
                disableSegmentClicks();

                instruction.textContent = '👆 Tap the tab to peel the wrapper!';
                instruction.classList.remove('peeling-done');
                biteCounter.innerHTML = '<span class="emoji">🍫</span> Chocolate ready: <strong>18 pieces</strong>';
                biteCounter.classList.remove('finished');
                resetBtn.style.display = 'none';

                const rect = chocolateArea.getBoundingClientRect();
                spawnSparkles(rect.left + rect.width / 2, rect.top + rect.height / 2, 10);
            }

            resetBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                resetAll();
            });

            // ────────────────────────────
            // Floating hearts
            // ────────────────────────────
            function createHearts() {
                const hearts = ['💕', '💖', '💗', '💝', '💘', '🩷', '💓', '🌸', '💐', '🩵'];
                for (let i = 0; i < 20; i++) {
                    const h = document.createElement('span');
                    h.className = 'floating-heart';
                    h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                    h.style.left = Math.random() * 94 + '%';
                    h.style.fontSize = (14 + Math.random() * 28) + 'px';
                    h.style.animationDuration = (8 + Math.random() * 15) + 's';
                    h.style.animationDelay = Math.random() * 12 + 's';
                    h.style.opacity = (0.25 + Math.random() * 0.4);
                    heartsContainer.appendChild(h);
                }
            }

            // ────────────────────────────
            // Init
            // ────────────────────────────
            function init() {
                buildSegments();
                disableSegmentClicks();
                createHearts();
                peelCurl.classList.remove('active');
                resetBtn.style.display = 'none';
                wrapper.style.clipPath = 'inset(0% 0 0 0)';
            }

            init();

            // Handle resize for peel-curl
            window.addEventListener('resize', function() {
                if (peelTapCount > 0 && peelTapCount < TOTAL_PEEL_TAPS && isPeelingPhase) {
                    const pp = (peelTapCount / TOTAL_PEEL_TAPS) * 100;
                    const ah = chocolateArea.offsetHeight;
                    peelCurl.style.top = Math.max(0, (pp / 100) * ah - 9) + 'px';
                }
            });

            console.log('🍫 Ualvo tcstsqpvn – LONG Dairy Milk style bar ready!');
            console.log('👆 Tap the gold PULL tab to start peeling');
            console.log('😋 18 delicious pieces to enjoy!');
        })();
    </script>
</body>
</html>
